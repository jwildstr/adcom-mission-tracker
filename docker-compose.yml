services:
  app:
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH}  # Passing COMMIT_HASH as an argument
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    networks:
      - adcom-sites
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped

networks:
  adcom-sites:
    name: adcom-sites
    external: true
